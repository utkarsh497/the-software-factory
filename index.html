<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locus · The Software Factory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: clamp(12px, 1.4vw, 14px);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03) 0px,
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  .terminal {
    padding: clamp(8px, 2vw, 20px) clamp(10px, 3vw, 30px);
    min-height: 100vh;
    max-width: 920px;
    margin: 0 auto;
  }

  .title-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #111;
    border: 1px solid #222;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28c840; }
  .title-text { color: #444; font-size: 11px; margin-left: 12px; user-select: none; }

  .terminal-body {
    background: #0d0d0d;
    border: 1px solid #222;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: clamp(12px, 2.5vw, 24px);
  }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
    min-height: 1.7em;
  }

  .g { color: #00D173; }
  .w { color: #d4d4d4; }
  .d { color: #444; }
  .b { color: #fff; font-weight: 700; }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 1em;
    background: #00D173;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Box lines — hidden on small screens */
  .box-line { }

  .terminal-input-wrapper {
    display: flex;
    align-items: center;
    margin-top: 8px;
  }

  .terminal-input {
    background: transparent;
    border: none;
    color: #d4d4d4;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(14px, 1.4vw, 14px);
    outline: none;
    flex: 1;
    caret-color: #00D173;
    min-width: 0;
  }

  .terminal-input::placeholder { color: #2a2a2a; }

  .cta-container { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    border: 1px solid #00D173;
    border-radius: 0;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(12px, 1.3vw, 13px);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    color: #00D173;
    background: transparent;
    min-height: 44px;
  }

  .cta-btn:hover { background: #00D173; color: #0a0a0a; }
  .cta-btn-primary { background: #00D173; color: #0a0a0a; }
  .cta-btn-primary:hover { background: #00ff88; border-color: #00ff88; }

  .job-result { padding: 3px 0; cursor: pointer; transition: color 0.15s; }
  .job-result:hover { color: #00D173; }
  .job-result a { color: inherit; text-decoration: none; }
  .job-result a:hover { text-decoration: underline; }

  .hint-line {
    color: #111;
    transition: color 4s ease;
  }
  .hint-line.visible { color: #333; }

  /* Rocket overlay */
  .rocket-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a0a;
    z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .rocket-overlay.active { opacity: 1; pointer-events: all; }
  .rocket-text { font-size: 64px; transition: transform 2s cubic-bezier(0.25, 0.1, 0.25, 1); }
  .rocket-text.launched { transform: translateY(-120vh) scale(0.3); }
  .launch-countdown { font-size: 48px; color: #fff; font-weight: 700; margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }
  .launch-exhaust { font-size: 24px; opacity: 0; transition: opacity 0.3s; }
  .launch-exhaust.visible { opacity: 1; }
  .launch-status { color: #00D173; font-size: 14px; margin-top: 24px; text-align: center; opacity: 0; transition: opacity 0.4s; font-family: 'JetBrains Mono', monospace; }
  .launch-status.visible { opacity: 1; }
  .launch-progress { width: min(300px, 80vw); height: 4px; background: #222; margin-top: 16px; overflow: hidden; opacity: 0; transition: opacity 0.3s; }
  .launch-progress.visible { opacity: 1; }
  .launch-progress-bar { height: 100%; background: #00D173; width: 0%; transition: width 3s ease; }
  .launch-msg { color: #444; font-size: 13px; margin-top: 20px; text-align: center; max-width: min(400px, 80vw); opacity: 0; transition: opacity 0.8s; font-family: 'JetBrains Mono', monospace; }
  .launch-msg.visible { opacity: 1; }

  /* ── Responsive ── */

  @media (max-width: 768px) {
    .title-text { display: none; }
    .terminal-input { font-size: 16px; } /* prevent iOS zoom */
  }

  @media (max-width: 480px) {
    .dot { width: 8px; height: 8px; }
    .title-bar { padding: 6px 8px; }
    .cta-container { flex-direction: column; }
    .cta-btn { width: 100%; text-align: center; }
    .box-line { display: none; }
    .box-divider { display: block; }
  }

  @media (max-width: 360px) {
    body { font-size: 11px; }
  }

  @media (max-height: 500px) and (orientation: landscape) {
    .rocket-text { font-size: 40px; }
    .launch-countdown { font-size: 28px; }
    .launch-msg { display: none; }
  }

  @media (hover: none) and (pointer: coarse) {
    .job-result { padding: 8px 0; }
    .terminal-input { font-size: 16px; }
  }

  /* ── Vapi voice button overrides ── */
  .vapi-btn {
    font-family: 'JetBrains Mono', monospace !important;
    z-index: 999 !important;
    position: fixed !important;
  }

  /* ── Visitor capture modal ── */
  .visitor-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 10, 10, 0.95);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 1; transition: opacity 0.3s;
  }
  .visitor-overlay.hidden { opacity: 0; pointer-events: none; }
  .visitor-box {
    max-width: min(420px, 90vw);
    width: 100%;
    padding: clamp(20px, 4vw, 32px);
  }
  .visitor-box h2 {
    color: #00D173;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(14px, 1.6vw, 16px);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .visitor-box p {
    color: #444;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 1.2vw, 12px);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .visitor-input {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px solid #333;
    color: #d4d4d4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    margin-bottom: 12px;
    outline: none;
    min-height: 44px;
  }
  .visitor-input:focus { border-color: #00D173; }
  .visitor-input::placeholder { color: #333; }
  .visitor-submit {
    width: 100%;
    background: #00D173;
    color: #0a0a0a;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    min-height: 44px;
    margin-top: 4px;
  }
  .visitor-submit:hover { background: #00ff88; }
  .visitor-skip {
    display: block;
    text-align: center;
    color: #333;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-top: 12px;
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
  }
  .visitor-skip:hover { color: #555; }

  @media (max-width: 768px) {
    .visitor-input { font-size: 16px; }
  }

  /* ── Fallback mic button (shows until Vapi loads) ── */
  .mic-fallback {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #00D173;
    border: none;
    cursor: pointer;
    z-index: 998;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0, 209, 115, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .mic-fallback:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(0, 209, 115, 0.5);
  }
  .mic-fallback svg { width: 22px; height: 22px; stroke: #0a0a0a; fill: none; }
  .mic-fallback.vapi-loaded { display: none; }
</style>
</head>

  line('<span class="d">---</span>');
}

function boxTop(label) {
  line('<span class="g">  ┌─ ' + label + ' ' + '─'.repeat(Math.max(0, 52 - label.length)) + '</span>', 'box-line');
}

function boxMid(text) {
  line('<span class="g">  │</span> <span class="w">' + text + '</span>', 'box-line');
}

function boxBot() {
  line('<span class="g">  └' + '─'.repeat(54) + '</span>', 'box-line');
}

function boxMobileDivider(label) {
  // Shown only on mobile when box lines are hidden
  var div = document.createElement('div');

function createInputLine() {
  var wrap = document.createElement('div');
  wrap.className = 'terminal-input-wrapper';
  wrap.innerHTML = '<span class="g">▶</span>&nbsp;<span class="w">locus</span><span class="d">:</span><span class="g">~</span>&nbsp;<span class="d">$</span>&nbsp;<input type="text" class="terminal-input" placeholder="type a command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">';
  return wrap;
}

function onInputKey(e) {
  if (e.key === 'Enter' && e.target.value.trim()) {
    handleCommand(e.target.value);
  }
  // Let arrow keys scroll the page when input is empty
  if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && !e.target.value) {
    e.target.blur();
  }
  // Let left/right arrow keys pass through when cursor is at boundaries
  if (e.key === 'ArrowLeft' && e.target.selectionStart === 0) {
    e.target.blur();
  }
  if (e.key === 'ArrowRight' && e.target.selectionStart === e.target.value.length) {
    e.target.blur();
  }
}

// ROCKET LAUNCH — flat setTimeout chain, pre-opened tab
// ════════════════════════════════════════════════════════════

function launchRocket(url) {
  var ov = document.getElementById('rocketOverlay');
  var rk = document.getElementById('rocketEmoji');
  var ex = document.getElementById('launchExhaust');
  var cd = document.getElementById('launchCountdown');
  var st = document.getElementById('launchStatus');
  var pg = document.getElementById('launchProgress');
  var pb = document.getElementById('launchProgressBar');
  var mg = document.getElementById('launchMsg');

  // Pre-open styled tab with fork instructions
  var newTab = window.open('about:blank', '_blank');
  if (newTab) {
    newTab.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap");*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#d4d4d4;font-family:"JetBrains Mono",monospace;font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}@keyframes p{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}.c{max-width:560px;width:100%}.t{color:#00D173;font-size:16px;font-weight:700;margin-bottom:16px}.l{color:#00D173;font-size:14px;letter-spacing:2px;margin-bottom:24px}.l span{animation:p 1.4s infinite}.l span:nth-child(2){animation-delay:.2s}.l span:nth-child(3){animation-delay:.4s}.s{margin-top:24px;border-top:1px solid #222;padding-top:20px}.h{color:#fff;font-weight:700;margin-bottom:12px}.r{color:#d4d4d4;line-height:1.8;margin-bottom:6px}.d{color:#555}.g{color:#00D173}.box{border:1px solid #222;padding:16px;margin:16px 0;font-size:13px;line-height:1.7;color:#888}code{color:#00D173;background:#111;padding:2px 6px}</style></head><body><div class="c"><div class="t">▶ FORK &amp; APPLY</div><div class="l">Launching<span>.</span><span>.</span><span>.</span></div><div class="s"><div class="h">How to apply via PR:</div><div class="r"><span class="g">1.</span> Fork the repo (loading below)</div><div class="r"><span class="g">2.</span> Create: <code>applications/your-github-username.md</code></div><div class="r"><span class="g">3.</span> In that file, include:</div><div class="box"><span class="d"># Your Name</span><br><br><span class="d">**Role:**</span> e.g. Staff Engineer<br><span class="d">**CV / LinkedIn:**</span> link here<br><span class="d">**One thing I built:**</span> describe it — what, why, how<br><span class="d">**Why Locus:**</span> one line is enough</div><div class="r"><span class="g">4.</span> Open a PR — we review every single one personally</div><div class="r d" style="margin-top:12px">The GitHub fork page will load in a moment...</div></div></div></body></html>');
    newTab.document.close();
  }

  // Reset state
  rk.classList.remove('launched');
  ex.classList.remove('visible');
  st.classList.remove('visible');
  pg.classList.remove('visible');
  mg.classList.remove('visible');
  pb.style.transition = 'none';
  pb.style.width = '0%';
  void pb.offsetWidth;
  pb.style.transition = 'width 1.5s ease';
  cd.textContent = '';
  st.textContent = '';
  mg.textContent = '';

  // Show overlay
  ov.classList.add('active');

  // T+0: countdown 3
  cd.textContent = '3';

  // T+400ms: countdown 2
  setTimeout(function() { cd.textContent = '2'; }, 400);

  // T+800ms: countdown 1
  setTimeout(function() { cd.textContent = '1'; }, 800);

  // T+1200ms: LAUNCH
  setTimeout(function() {
    cd.textContent = 'LAUNCH';
    ex.classList.add('visible');
    st.textContent = 'Forking...';
    st.classList.add('visible');
    pg.classList.add('visible');
    pb.style.width = '100%';
  }, 1200);

  // T+1800ms: rocket flies
  setTimeout(function() {
    rk.classList.add('launched');
    ex.classList.remove('visible');
    st.textContent = "You're in.";
    mg.textContent = 'The Software Factory — no handoffs, no committees, just builders.';
    mg.classList.add('visible');
  }, 1800);

  // T+2500ms: navigate
  setTimeout(function() {
    if (newTab && !newTab.closed) {
      newTab.location.href = url;
    } else {
      window.open(url, '_blank');
    }
  }, 2500);

  // T+3500ms: reset overlay
  setTimeout(function() {
    ov.classList.remove('active');
    rk.classList.remove('launched');
    st.classList.remove('visible');
    pg.classList.remove('visible');
    mg.classList.remove('visible');
    pb.style.width = '0%';
    cd.textContent = '';
  }, 6300);
}

// EASTER EGGS (3 triggers, base64-encoded secrets)
// ════════════════════════════════════════════════════════════

// 1. Konami Code
var konamiSeq = [38,38,40,40,37,39,37,39,66,65];
var konamiIdx = 0;
document.addEventListener('keydown', function(e) {
  if (e.target.classList && e.target.classList.contains('terminal-input')) return;
  if (e.keyCode === konamiSeq[konamiIdx]) {
    konamiIdx++;
    if (konamiIdx === konamiSeq.length) {
      konamiIdx = 0;
