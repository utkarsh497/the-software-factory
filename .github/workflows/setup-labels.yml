name: Setup Hiring Labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create hiring pipeline labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'application', color: '0E8A16', description: 'Candidate application via PR' },
              { name: 'new', color: '1D76DB', description: 'New application — not yet reviewed' },
              { name: 'reviewing', color: 'FBCA04', description: 'Application under review' },
              { name: 'interview', color: '5319E7', description: 'Scheduled for interview' },
              { name: 'strong-yes', color: '0E8A16', description: 'Strong candidate — move forward' },
              { name: 'hold', color: 'F9D0C4', description: 'Revisit later' },
              { name: 'pass', color: 'E4E669', description: 'Not a fit for this role' },
              { name: 'hired', color: '00D173', description: 'Offer accepted 🎉' },
              { name: 'easter-egg', color: 'FF8C00', description: 'Found the easter egg — fast track' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                console.log(`Label ${label.name} may already exist`);
              }
            }
